name: Autonomous Marketing & Maintenance

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  marketing-assets-gen:
    name: Generate Autonomous Marketing Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @google-cloud/aiplatform @google-cloud/storage

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Execute Orchestration Script
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          VEO3_API_KEY: ${{ secrets.VEO3_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_MARKETING_BUCKET }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          LOCATION: 'us-central1'
        run: node .github/scripts/announce-release.js
