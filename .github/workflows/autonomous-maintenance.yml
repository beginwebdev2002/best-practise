name: Autonomous Maintenance

on:
  schedule:
    - cron: '0 0 * * *' # Запуск в полночь
  workflow_dispatch:    # Кнопка для ручного запуска

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-agent-run:
    name: Jules AI Agent Execution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git for Bot
        run: |
          git config --global user.name "${{secrets.BOT_NAME}}"
          git config --global user.email "${{secrets.BOT_EMAIL}}"

      - name: Execute Autonomous Audit & Update
        env:
          GH_TOKEN: ${{ secrets.JULES_GITHUB_TOKEN_BOT }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "✨ Changes detected. Creating a specialized PR..."
            
            BRANCH_NAME="ai-maintenance/$(date +'%Y-%m-%d-%H%M')"
            
            git checkout -b $BRANCH_NAME
            git add .
            git commit -m "chore(ai): autonomous architecture update $(date +'%Y-%m-%d')"
            git push origin $BRANCH_NAME
            
            gh pr create \
              --title "🤖 AI Autonomous Update: $(date +'%Y-%m-%d')" \
              --body "This PR was automatically generated by Jules AI to maintain architecture standards, SEO, and documentation rules defined in \`.agents/rules/\`." \
              --label "type: 🚀 feature" || echo "⚠️ Failed to create PR. Maybe it already exists?"
          else
            echo "✅ Everything is optimal. No changes needed today."
          fi
